name: Build & Deploy to Obsidian

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install MCP server dependencies
        run: cd mcp-server && npm install

      - name: Deploy to Obsidian vault
        run: |
          PLUGIN_DIR="$HOME/MyFiles/Obsidian/All in One/.obsidian/plugins/ai-daily-chat"
          mkdir -p "$PLUGIN_DIR"
          cp main.js manifest.json styles.css "$PLUGIN_DIR/"
          if [ -d mcp-dist ]; then
            cp -r mcp-dist "$PLUGIN_DIR/"
            echo "Deployed with mcp-dist to $PLUGIN_DIR"
          else
            echo "WARNING: mcp-dist not found, skipping"
            echo "Deployed to $PLUGIN_DIR"
          fi
