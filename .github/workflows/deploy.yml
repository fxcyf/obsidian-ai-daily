name: Build & Deploy to Obsidian

on:
  push:
    branches: [main]

concurrency:
  group: deploy-obsidian
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          cd mcp-server && npm install && cd ..
          cd proxy-server && npm install && cd ..

      - name: Build
        run: |
          npm run build
          cd mcp-server && npm run build && cd ..
          cd proxy-server && npm run build && cd ..

      - name: Deploy plugin to Obsidian vault
        run: |
          PLUGIN_DIR="$HOME/MyFiles/Obsidian/All in One/.obsidian/plugins/ai-daily-chat"
          mkdir -p "$PLUGIN_DIR"
          cp -r dist/* "$PLUGIN_DIR/"
          echo "Deployed plugin to $PLUGIN_DIR"

      - name: Deploy backend services to persistent repo
        run: |
          MCP_REPO="$HOME/MyFiles/random/obsidian-ai-daily"
          cd "$MCP_REPO"
          git pull origin main
          cd mcp-server && npm install && npm run build
          echo "MCP server rebuilt at $MCP_REPO/mcp-server/dist"
          cd ../proxy-server && npm install && npm run build
          echo "Proxy server rebuilt at $MCP_REPO/proxy-server/dist"

      - name: Update and restart proxy server
        run: |
          sudo cp proxy-server/deploy/obsidian-proxy.service /etc/systemd/system/obsidian-proxy.service
          sudo systemctl daemon-reload
          sudo systemctl restart obsidian-proxy

      - name: Verify proxy server
        run: |
          sleep 2
          curl -sf http://localhost:27090/health && echo "proxy server OK"
